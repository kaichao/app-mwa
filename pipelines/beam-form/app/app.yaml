name: app.beam-form
cluster: ${CLUSTER}
parameters:
  # initial_status: RUNNING
  initial_status: INITIAL
  main_router: router-beam-form
  global_copier_size: 3
  global_copier_env: '{}'
  slot_group: '{"pull-unpack":1,"beam-make":4,"down-sample":1,"fits-redist":1}'

vcluster:
  parameters:
    base_data_dir: /public/home/cstu0030/scalebox/mydata
    uname: cstu0030
    port: 50022
    grpc_server: 10.100.1.30
    grpc_remote_server: 60.245.128.60
  hosts:
    h0:
      label: head-node
      ip_addr: 10.100.1.30
      role: head
      uname: astro
      port: 10022
    n0:
      label: I/O node 
      ip_addr: 60.245.128.14
      uname: cstu0030
      port: 65010
      parameters:
        use_home_tmp: "yes"
  backend_config:
    type: slurm
    user_name: cstu0030
    partition: cstdemo
    num_groups: ${NUM_GROUPS}
    group_size: 24
    group_prefix: d

modules:
  tar-load:
    base_image: ${FILE_COPY}
    arguments:
      # dir_quota_gb: '{
      #   "/public/home/cstu0092/scalebox":440,
      #   "/public/home/cstu0093/scalebox":440,
      #   "/public/home/cstu0094/scalebox":440,
      #   "/public/home/cstu0095/scalebox":440,
      #   "/public/home/cstu0096/scalebox":440,
      #   "/public/home/cstu0097/scalebox":440,
      #   "/public/home/cstu0098/scalebox":440,
      #   "/public/home/cstu0099/scalebox":440
      #   }'
    environments:
      # retryж—¶пјҢдә§з”ҹmain-routerзҡ„ж–°taskиҰҒиҰҶзӣ– 
      - CONFLICT_ACTION=OVERWRITE
    slots:
      - n0:3

  # ејҖе…іеҠҹиғҪпјҢжҜҸж¬Ўд»…иғҪйҖҡиҝҮдёҖдёӘ
  wait-queue:
    base_image: hub.cstcloud.cn/scalebox/agent:latest
    arguments:
      code_path: ${PWD}/../modules/wait-queue/code
      slot_options: slot_on_head
    parameters:
      vtask_size: 1
    environments:
      # retryж—¶пјҢиҰҶзӣ–main-routerзҡ„ж–°task
      - CONFLICT_ACTION=OVERWRITE

  vtask-head:
    base_image: hub.cstcloud.cn/scalebox/agent:latest
    parameters:
      task_dist_mode: SLOT-BOUND
      vtask_role: head
      vtask_size: 3
      vtask_size_sema_copy: yes
    slots:
      # жңҖеӨҡеҲҶз»„дёә3
      - h0:${NUM_GROUPS}

  pull-unpack:
    base_image: ${FILE_COPY}
    command: ${COMMAND_TEMPLATE}
    arguments:
      code_path: ${CODE_BASE}/pull-unpack/code
      slot_options: tmpfs_workdir
      free_space_gb: '{"${LOCAL_TMPDIR}/dat":15}'
      dir_quota_gb: '{"${LOCAL_TMPDIR}/dat":95}'
    parameters:
      task_dist_mode: HOST-BOUND
      vtask_role: core
      pod_id: by_channel
      router_index: 2
      key_group_regex: ^([0-9]+)
    environments:
      - SOURCE_URL=
      - SOURCE_JUMP=${SOURCE_JUMP}
      - TARGET_SUBDIR=${TARGET_SUBDIR}
      - TARGET_URL=
      # - BW_LIMIT=${BW_LIMIT}
      - KEEP_SOURCE_FILE=yes
      # и§ЈеҢ…еҗҺж–Үд»¶зҡ„group-idпјҢзЎ®дҝқи®Ўз®—е®ҢжҲҗеҗҺеҸҜеҲ йҷӨгҖӮ
      - TMPDIR_GROUP=39
      # - LOCAL_TMPDIR=${LOCAL_TMPDIR}
      # - LOCAL_SHMDIR=${LOCAL_SHMDIR}
    slots:
      - ${NODES}    

  beam-make:
    base_image: ${MWA_VCSTOOLS}
    command: ${ROCM_COMMAND}
    arguments:
      code_path: ${CODE_BASE}/beam-make/code
      task_max_seconds: 1200
      task_min_seconds: 30
      sleep_interval_seconds: 60
      # йҒҝе…Қе·ҘдҪңзӣ®еҪ•ж”ҫеңЁ /tmpдёӢпјҢиў«е®ҡжңҹеҲ йҷӨ
      slot_options: tmpfs_workdir
      free_space_gb: '{"${LOCAL_SHMDIR}/mydata":${BEAM_MAKE_FREE_GB}}'
    parameters:
      task_dist_mode: HOST-BOUND
      vtask_role: core
      pod_id: by_channel
      # з»„еҶ…дёҚи¶…иҝҮ6пјҢе…ЁеұҖдёҚи¶…иҝҮ8
      # node_progress_gap: '{"[a-z][0-9][0-9]":6,"[a-z]":8}'
      node_progress_gap: '{"[a-z][0-9][0-9]":6}'
      key_group_regex: ^([0-9]+)
      retry_rules: "['*:3','134:9','135:9','139:9']"
      slot_timeout_minutes: 30
      slot_recoverable: yes
      router_index: 1
      task_cache_expired_minutes: 65
    environments:
      - INPUT_ROOT=${LOCAL_TMPDIR}
      - OUTPUT_ROOT=${LOCAL_SHMDIR}
      - KEEP_TARGET_FILE=yes
      - POINTING_RANGE=${POINTING_RANGE}
      - ZSTD_TARGET_FILE=no
      # зІҫжҗңзҡ„жҢҮеҗ‘ж–Үд»¶еҗҚ
      - POINTING_FILE=${POINTING_FILE}
      - TMPDIR_GROUP=39
      # - LOCAL_TMPDIR=${LOCAL_TMPDIR}
      # - LOCAL_SHMDIR=${LOCAL_SHMDIR}
    slots:
      - ${NODES}:${NUM_BEAM_MAKE}
      - ${GROUP_SLOTS}
      - ${GLOBAL_SLOTS}

  down-sample:
    base_image: ${DOWN_SAMPLE}
    command: ${COMMAND_TEMPLATE}
    arguments:
      code_path: ${CODE_BASE}/down-sample/code
      # 20-min
      max_sleep_count: 200
      # йҒҝе…Қе·ҘдҪңзӣ®еҪ•ж”ҫеңЁ /tmpдёӢпјҢиў«е®ҡжңҹеҲ йҷӨ
      slot_options: tmpfs_workdir
    parameters:
      key_group_regex: ^([0-9]+)
      task_dist_mode: HOST-BOUND
      vtask_role: core
      pod_id: by_channel
      retry_rules: "['*:3']"
    environments:
      - INPUT_ROOT=${LOCAL_SHMDIR}
      - OUTPUT_ROOT=${LOCAL_SHMDIR}
      - KEEP_SOURCE_FILE=no
      - KEEP_TARGET_FILE=
      - ENABLE_LOCAL_COMPUTE=yes
      - TMPDIR_GROUP=39
      # - LOCAL_TMPDIR=${LOCAL_TMPDIR}
      # - LOCAL_SHMDIR=${LOCAL_SHMDIR}
    slots:
      - ${NODES}
      - ${GROUP_NODES}

  fits-redist:
    base_image: ${FILE_COPY}
    command: ${COMMAND_TEMPLATE}
    arguments:
      code_path: ${CODE_BASE}/fits-redist/code
      # 20-min
      max_sleep_count: 200
      # йҒҝе…Қе·ҘдҪңзӣ®еҪ•ж”ҫеңЁ /tmpдёӢпјҢиў«е®ҡжңҹеҲ йҷӨ
      slot_options: tmpfs_workdir
    parameters:
      key_group_regex: ^([0-9]+)
      task_dist_mode: HOST-BOUND
      vtask_role: core
      pod_id: by_channel
      retry_rules: "['*:3']"
    environments:
      # 1chx
      - INPUT_ROOT=${LOCAL_SHMDIR}
      # 1chy
      - OUTPUT_ROOT=${LOCAL_SHMDIR}
      - TARGET_ROOT=${LOCAL_SHMDIR}
      - TARGET_USER=${TARGET_USER}
      - TARGET_PORT=${TARGET_PORT}
      - KEEP_SOURCE_FILE=no
      - TMPDIR_GROUP=39
      - LOCAL_TMPDIR=${LOCAL_TMPDIR}
      - LOCAL_SHMDIR=${LOCAL_SHMDIR}
    slots:
      - ${NODES}
      - ${GROUP_NODES}

  fits-merge:
    label: 24йҖҡйҒ“fitsеҗҲе№¶
    command: ${COMMAND_TEMPLATE}
    base_image: ${MWA_VCSTOOLS}
    arguments:
      code_path: ${CODE_BASE}/fits-merge/code
    # 1 hour
      max_sleep_count: 720
      # йҒҝе…Қе·ҘдҪңзӣ®еҪ•ж”ҫеңЁ /tmpдёӢпјҢиў«е®ҡжңҹеҲ йҷӨ
      slot_options: tmpfs_workdir
    parameters:
      key_group_regex: ^([0-9]+)
      task_dist_mode: HOST-BOUND
      vtask_role: core
      pod_id: by_pointing
      retry_rules: "['*:3']"
    environments:
      - INPUT_ROOT=${LOCAL_SHMDIR}
      - OUTPUT_ROOT=
      - KEEP_SOURCE_FILE=no
      # "500k"/"1m"/...
      - BW_LIMIT=20m
      - TMPDIR_GROUP=39
      # - LOCAL_TMPDIR=${LOCAL_TMPDIR}
      # - LOCAL_SHMDIR=${LOCAL_SHMDIR}
    slots:
      - ${NODES}
      - ${PRESTO_NODES}

  # е…Ёе№¶иЎҢжЁЎејҸдёӢпјҢжң¬ең°еҒҡfitsеҗҲе№¶пјҢйңҖиҰҒжӢ·иҙқеҲ°еҗҺз»ӯи®Ўз®—иҠӮзӮ№дёҠпјҲиҝҗиЎҢеңЁи®Ўз®—иҠӮзӮ№дёҠпјү
  fits24ch-move:
    base_image: ${FILE_COPY}
    command: ${COMMAND_TEMPLATE}
    arguments:
      slot_options: tmpfs_workdir
    parameters:
      key_group_regex: ^([0-9]+)
      task_dist_mode: HOST-BOUND
      vtask_role: core
      pod_id: by_pointing
    environments:
      - SOURCE_URL=${LOCAL_SHMDIR}/mydata
      - TARGET_URL=
      - TARGET_JUMP=${TARGET_JUMP}
      - KEEP_SOURCE_FILE=no
    slots:
      - ${NODES}

  vtask-tail:
    base_image: hub.cstcloud.cn/scalebox/agent:latest
    arguments:
      slot_options: slot_on_head
    parameters:
      vtask_role: tail

  # йқһи®Ўз®—иҠӮзӮ№дёҠиҝҗиЎҢ
  fits24ch-unload:
    base_image: ${FILE_COPY}
    environments:
      - SOURCE_URL=/public/home/cstu0100/scalebox/mydata
      - KEEP_SOURCE_FILE=no
      # retryж—¶пјҢдә§з”ҹmain-routerзҡ„ж–°taskиҰҒиҰҶзӣ– 
      - CONFLICT_ACTION=OVERWRITE
    slots:
      - n0:3

  router-beam-form:
    base_image: app-mwa/router-beam-form-app
    arguments:
      # slot_options: reserved_on_exit
    parameters:
      key_group_regex: ^([0-9]+)
      task_dist_mode: SLOT-BOUND
      task_batch_size: 2
    environments:
      - PRELOAED_VPATH=yes
      # HPCеӯҳеӮЁең°еқҖпјҢзӣҙжҺҘеҠ иҪҪ
      - ORIGIN_ROOT=${ORIGIN_ROOT}
      - PRELOAD_ROOT=${PRELOAD_ROOT}
      - STAGING_ROOT=${STAGING_ROOT}
      - FINAL_ROOT=${FINAL_ROOT}

      - TIME_STEP=${TIME_STEP}
      - NODES=${NODES}
      # з”ЁдәҺеҲ йҷӨ dat ж–Үд»¶
      - SSH_USER=${TARGET_USER}
      - SSH_PORT=${TARGET_PORT}
      - LOCAL_TMPDIR=${LOCAL_TMPDIR}
      - LOCAL_SHMDIR=${LOCAL_SHMDIR}
      # йҰ–ж¬ЎеҠ иҪҪжӣҙй«ҳйҷҗйҖҹпјҢд»Ҙж”ҜжҢҒеҝ«йҖҹеҠ иҪҪ
      - FIRST_BW_LIMIT=${FIRST_BW_LIMIT}
      - BW_LIMIT=30m
      # з»„иҠӮзӮ№пјҢиӢҘдёҚдёәз©әпјҢеҲҷpull-unpackжҳҜеҗҰеҗҢжӯҘдә§з”ҹе…ЁеұҖdatж•°жҚ®пјҢд»Ҙж”ҜжҢҒз»„и®Ўз®—
      - GROUP_NODES=${GROUP_NODES}
      #  дёҚеҗҢchannelж•°жҚ®зҡ„и®Ўз®—йҮҸдёҚеҗҢпјҢдәӨеҸүеҲҶеёғжңүеҠ©дәҺеңЁеҗ„иҠӮзӮ№дёҠеқҮиЎЎеҲҶеёғи®Ўз®—йҮҸпјҢд»…й’ҲеҜ№24дёӘиҠӮзӮ№д»ҘдёҠжңүж•Ҳ
      - INTERLEAVED_DAT=yes
      # е…Ёе№¶иЎҢзҡ„жіўжқҹеҗҲжҲҗ(full_parallel)пјҢйҡҗеҗ«зқҖжҢҮеҗ‘дјҳе…Ҳзҡ„жҺ’еәҸ POINTING_FIRST=yes
      - RUN_MODE=${RUN_MODE}
      - PRESTO_APP_ID=${PRESTO_APP_ID}
      # з”Ёglobalд»ЈжӣҝvariableпјҢжӣҙжңүж•Ҳең°ж”ҜжҢҒеӨҡеә”з”Ёе…ұдә«
      - USE_GLOBAL_POINTING=yes
    slots:
      - h0:3
